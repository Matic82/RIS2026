services:
  oracle:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: maestro-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: MaestroDev1
      APP_USER: maestro_app
      APP_USER_PASSWORD: MaestroApp1
    volumes:
      - ./database:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
